name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Install feed client deps
        run: cd packages/feed/client && npm install

      - run: pnpm build

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @slice/tests exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm --filter @slice/tests exec playwright test --grep-invert "Mobile Screenshots"
        env:
          OPENROUTER_API_KEY: test-key
          SEED_DEMO: "true"
