<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Single pie slice, line art, π on it -->
  <g transform="translate(200, 220)">
    <!-- The slice: a wedge ~45 degrees -->
    <path d="M0,0 L-90,-150 A175,175 0 0,1 90,-150 Z" 
          fill="none" stroke="#4A2508" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Crust arc (thicker line on the outer edge) -->
    <path d="M-90,-150 A175,175 0 0,1 90,-150" 
          fill="none" stroke="#4A2508" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Filling layer line inside the slice -->
    <path d="M-12,-20 L-72,-120 A140,140 0 0,1 72,-120 Z" 
          fill="none" stroke="#D4423B" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="none"/>

    <!-- Pi symbol centered in the slice -->
    <text x="0" y="-65" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#4A2508">π</text>
  </g>

  <!-- Wordmark below -->
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#4A2508" letter-spacing="2">
    <tspan fill="#D4423B">π</tspan><tspan>-slice</tspan>
  </text>
  <text x="200" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#8B5E1A" letter-spacing="5" font-style="italic">FRESH FROM THE OVEN</text>
</svg>
