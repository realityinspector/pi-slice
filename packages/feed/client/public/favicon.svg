<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <g transform="translate(64, 72)">
    <!-- The slice wedge -->
    <path d="M0,0 L-32,-54 A63,63 0 0,1 32,-54 Z" 
          fill="none" stroke="#4A2508" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Crust (thicker outer arc) -->
    <path d="M-32,-54 A63,63 0 0,1 32,-54" 
          fill="none" stroke="#4A2508" stroke-width="7" stroke-linecap="round"/>
    
    <!-- Filling line -->
    <path d="M-4,-7 L-25,-43 A50,50 0 0,1 25,-43 Z" 
          fill="none" stroke="#D4423B" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Pi symbol -->
    <text x="0" y="-20" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#4A2508">π</text>
  </g>
</svg>
