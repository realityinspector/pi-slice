<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A2508"/>
      <stop offset="100%" stop-color="#2D1605"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4423B"/>
      <stop offset="100%" stop-color="#A02E28"/>
    </linearGradient>
    <radialGradient id="mpg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E8A849"/>
      <stop offset="100%" stop-color="#A05A1B"/>
    </radialGradient>
  </defs>

  <!-- Left section -->
  <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#bg1)"/>
  <!-- Right section -->
  <rect x="80" y="0" width="160" height="80" rx="0" fill="url(#bg2)"/>
  <rect x="232" y="0" width="8" height="80" rx="0" fill="url(#bg2)"/>
  <!-- Round right corners -->
  <rect x="0" y="0" width="240" height="80" rx="8" fill="none" stroke="none"/>
  <clipPath id="badgeClip">
    <rect x="0" y="0" width="240" height="80" rx="8"/>
  </clipPath>
  <g clip-path="url(#badgeClip)">
    <rect x="0" y="0" width="80" height="80" fill="url(#bg1)"/>
    <rect x="80" y="0" width="160" height="80" fill="url(#bg2)"/>
  </g>

  <g clip-path="url(#badgeClip)">
    <!-- Mini pie icon in left section -->
    <g transform="translate(40, 38)">
      <path d="M0,0 L0,-20 A20,20 0 1,1 14.1,-14.1 Z" fill="url(#mpg)"/>
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#D4423B" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="14.1" y2="-14.1" stroke="#D4423B" stroke-width="1.5"/>
      <text x="-6" y="5" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#6B3A0A" opacity="0.5">&#960;</text>
    </g>

    <!-- Text in right section -->
    <text x="160" y="38" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="bold" fill="#FDF6EC" letter-spacing="1.5">&#960;-slice</text>
    <text x="160" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#FDF6ECBB" letter-spacing="3" font-style="italic">OPEN SOURCE</text>
  </g>

  <!-- Outer border -->
  <rect x="0" y="0" width="240" height="80" rx="8" fill="none" stroke="#E8A84933" stroke-width="1.5"/>
</svg>
